name: osu-wiki continuous integration

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - edited

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-should-ci:
    name: determine if CI should run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ fromJson(steps.calc.outputs.result).shouldRun }}
      changed_files: ${{ fromJson(steps.calc.outputs.result).changedFiles }}
    steps:
      - name: calculate PR changes
        id: calc
        uses: actions/github-script@v6
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const result = { shouldRun: 'false', changedFiles: JSON.stringify([]) };

            if (!pr) return result;

            const FLAGS = ['SKIP_REMARK', 'SKIP_WIKILINK_CHECK'];
            let shouldRun = false;

            if (action === 'opened' || action === 'reopened' || action === 'synchronize') {
              shouldRun = true;
            } else if (action === 'edited') {
              const bodyChange = context.payload.changes && context.payload.changes.body;
              if (bodyChange) {
                const oldBody = bodyChange.from || '';
                const newBody = pr.body || '';
                shouldRun = FLAGS.some(flag => oldBody.includes(flag) !== newBody.includes(flag));
              }
            }

            if (!shouldRun) return result;

            const files = [];
            const iter = github.paginate.iterator(github.rest.pulls.listFiles, {
              owner, repo, pull_number: pr.number, per_page: 100,
            });
            for await (const resp of iter) {
              for (const f of resp.data) {
                if (f.status !== 'removed') files.push(f.filename);
              }
            }

            result.shouldRun = 'true';
            result.changedFiles = JSON.stringify(files);
            return result;

  ci:
    name: changed files
    needs: check-should-ci
    if: ${{ needs.check-should-ci.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - name: load node_modules from cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}-${{ steps.setup-node.outputs.node-version }}

      - name: "if cache is outdated: install node.js dependencies"
        if: ${{ steps.cache-node-modules.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Install package manager (Python)
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies (Python)
        run: uv sync

      - name: Detect changed files
        id: detect-changed-files
        # Use NUL as a separator to prevent filenames containing spaces and punctuation marks from tripping up the scripts.
        run: |
          CHANGED_FILES_PATH="$RUNNER_TEMP/changed_files"
          jq -j '.[] + "\u0000"' <<<"$CHANGED_JSON" > "$CHANGED_FILES_PATH"
          echo "CHANGED_FILES=$CHANGED_FILES_PATH" >> "$GITHUB_ENV"
        env:
          CHANGED_JSON: ${{ needs.check-should-ci.outputs.changed_files }}

      - name: check file sizes
        if: ${{ !cancelled() && steps.detect-changed-files.outcome == 'success' }}
        run: xargs -0r meta/check-file-sizes.sh <"$CHANGED_FILES"

      - name: run remark on changed files
        if: ${{ !cancelled() && steps.detect-changed-files.outcome == 'success' }}
        continue-on-error: ${{ contains(github.event.pull_request.body, 'SKIP_REMARK') }}
        run: |
          grep -z '\.md$' <"$CHANGED_FILES" | \
          REPORTER=vfile-reporter-github-action xargs -0r meta/remark.sh

      - name: run yamllint on .yaml and .md files
        if: ${{ !cancelled() && steps.detect-changed-files.outcome == 'success' }}
        run: uv tool run osu-wiki-tools check-yaml --format github

      - name: find broken wikilinks
        if: ${{ !cancelled() && steps.detect-changed-files.outcome == 'success' }}
        continue-on-error: ${{ contains(github.event.pull_request.body, 'SKIP_WIKILINK_CHECK') }}
        run: uv tool run osu-wiki-tools check-links --all --format github
